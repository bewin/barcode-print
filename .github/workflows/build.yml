name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./barcode-print-mobile

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.x'
          channel: 'stable'

      - name: Fix Android project structure
        run: |
          cp android/app/src/main/AndroidManifest.xml /tmp/AndroidManifest.xml
          rm -rf android/
          flutter create --platforms=android .
          cp /tmp/AndroidManifest.xml android/app/src/main/AndroidManifest.xml

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: barcode-print-apk
          path: barcode-print-mobile/build/app/outputs/flutter-apk/app-release.apk
